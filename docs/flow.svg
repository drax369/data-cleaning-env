<svg width="800" height="1020" viewBox="0 0 800 1020" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- SECTION 1: Hackathon Checker -->
  <rect x="40" y="30" width="720" height="38" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.8"/>
  <text x="400" y="54" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Hackathon checker</text>

  <rect x="60" y="86" width="200" height="50" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="160" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Ping Space</text>
  <text x="160" y="124" text-anchor="middle" font-size="11" fill="#5F5E5A">GET / → 200 ok</text>

  <rect x="300" y="86" width="200" height="50" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="400" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Validate spec</text>
  <text x="400" y="124" text-anchor="middle" font-size="11" fill="#5F5E5A">openenv.yaml</text>

  <rect x="540" y="86" width="200" height="50" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="640" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Docker build</text>
  <text x="640" y="124" text-anchor="middle" font-size="11" fill="#5F5E5A">Dockerfile → image</text>

  <line x1="400" y1="136" x2="400" y2="166" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- SECTION 2: Episode Start -->
  <rect x="40" y="170" width="720" height="38" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.8"/>
  <text x="400" y="194" text-anchor="middle" font-size="15" font-weight="bold" fill="#26215C">Episode starts — reset(task_id)</text>

  <rect x="220" y="226" width="360" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="400" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="#26215C">tasks.py generates dirty data</text>
  <text x="400" y="264" text-anchor="middle" font-size="11" fill="#3C3489">np.random.seed(42) — fully reproducible</text>

  <line x1="310" y1="278" x2="160" y2="314" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="278" x2="400" y2="314" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="490" y1="278" x2="640" y2="314" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="60" y="318" width="200" height="50" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="160" y="339" text-anchor="middle" font-size="13" font-weight="bold" fill="#04342C">Task 1 — easy</text>
  <text x="160" y="356" text-anchor="middle" font-size="11" fill="#085041">nulls only</text>

  <rect x="300" y="318" width="200" height="50" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="400" y="339" text-anchor="middle" font-size="13" font-weight="bold" fill="#412402">Task 2 — medium</text>
  <text x="400" y="356" text-anchor="middle" font-size="11" fill="#633806">types + dupes</text>

  <rect x="540" y="318" width="200" height="50" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="640" y="339" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A1B0C">Task 3 — hard</text>
  <text x="640" y="356" text-anchor="middle" font-size="11" fill="#712B13">full pipeline</text>

  <line x1="160" y1="368" x2="340" y2="402" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="400" y1="368" x2="400" y2="402" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="640" y1="368" x2="460" y2="402" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="180" y="406" width="440" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="400" y="427" text-anchor="middle" font-size="13" font-weight="bold" fill="#26215C">Observation returned to agent</text>
  <text x="400" y="445" text-anchor="middle" font-size="11" fill="#3C3489">null_counts, dtype_issues, duplicates, outliers, sample_rows</text>

  <line x1="400" y1="458" x2="400" y2="488" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- SECTION 3: Agent Loop -->
  <rect x="40" y="492" width="720" height="38" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="400" y="516" text-anchor="middle" font-size="15" font-weight="bold" fill="#042C53">Agent loop — repeats up to 20 steps</text>

  <rect x="180" y="548" width="440" height="52" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="400" y="569" text-anchor="middle" font-size="13" font-weight="bold" fill="#042C53">inference.py — build_prompt(obs)</text>
  <text x="400" y="586" text-anchor="middle" font-size="11" fill="#0C447C">formats observation into LLM prompt</text>

  <line x1="400" y1="600" x2="400" y2="628" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="180" y="632" width="440" height="52" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="400" y="653" text-anchor="middle" font-size="13" font-weight="bold" fill="#042C53">LLM call — OpenAI client</text>
  <text x="400" y="670" text-anchor="middle" font-size="11" fill="#0C447C">MODEL_NAME · API_BASE_URL · HF_TOKEN</text>

  <line x1="400" y1="684" x2="400" y2="712" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="180" y="716" width="440" height="52" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="400" y="737" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Action returned as JSON</text>
  <text x="400" y="754" text-anchor="middle" font-size="11" fill="#5F5E5A">fill_null · cast_type · drop_duplicates · clip_outliers · standardize</text>

  <line x1="400" y1="768" x2="400" y2="796" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="180" y="800" width="440" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="400" y="821" text-anchor="middle" font-size="13" font-weight="bold" fill="#04342C">env.step(action)</text>
  <text x="400" y="838" text-anchor="middle" font-size="11" fill="#085041">applies action to dataframe in memory</text>

  <line x1="400" y1="852" x2="400" y2="880" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="180" y="884" width="440" height="52" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="400" y="905" text-anchor="middle" font-size="13" font-weight="bold" fill="#173404">graders.py — score new state</text>
  <text x="400" y="922" text-anchor="middle" font-size="11" fill="#27500A">reward 0.0–1.0 · partial credit per issue type</text>

  <line x1="400" y1="936" x2="400" y2="958" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="400,962 520,990 400,1018 280,990" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="400" y="986" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">score >= 0.95</text>
  <text x="400" y="1000" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">or steps >= 20?</text>

  <!-- Loop back arrow -->
  <path d="M280 990 L100 990 L100 570 L178 570" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="58" y="784" text-anchor="middle" font-size="11" fill="#185FA5" font-weight="bold">no</text>
  <text x="58" y="798" text-anchor="middle" font-size="11" fill="#185FA5">loop</text>

  <!-- Done label -->
  <text x="545" y="986" text-anchor="start" font-size="11" fill="#3B6D11" font-weight="bold">yes → done</text>
  <text x="545" y="1000" text-anchor="start" font-size="11" fill="#3B6D11">print final score</text>

</svg>
